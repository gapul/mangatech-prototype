<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ジャンがり - MangaTech 2026</title>
  <style>
    :root {
      --deep-black: #0D0D0D;
      --clean-white: #F2F2F2;
      --brand-red: #F20505;
      --dark-red: #8C0303;
      --impact-yellow: #F2CB05;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--deep-black);
      color: var(--clean-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow-x: hidden;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    /* Halftone overlay globally */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(var(--clean-white) 10%, transparent 11%), radial-gradient(var(--clean-white) 10%, transparent 11%);
      background-size: 6px 6px;
      background-position: 0 0, 3px 3px;
      mix-blend-mode: overlay;
      opacity: 0.15;
      pointer-events: none;
      z-index: 9999;
    }

    /* Manga Speed Lines Background */
    .speedlines {
      position: fixed;
      inset: -50%;
      background: repeating-conic-gradient(from 0deg, transparent 0deg 3deg, rgba(242, 5, 5, 0.08) 3deg 5deg);
      z-index: 0;
      pointer-events: none;
      animation: rotate-speedlines 60s linear infinite;
    }

    @keyframes rotate-speedlines {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1000px;
      text-align: center;
    }

    .kicker {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--impact-yellow);
      display: inline-block;
      background: var(--deep-black);
      padding: 6px 20px;
      border: 4px solid var(--clean-white);
      transform: rotate(-2deg);
      margin-bottom: 20px;
      box-shadow: 6px 6px 0px var(--brand-red);
    }

    .hero-title {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--clean-white);
      text-shadow: 6px 6px 0px var(--brand-red);
      margin-bottom: 10px;
      font-style: italic;
    }

    .hero-subtitle {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--impact-yellow);
      margin-bottom: 60px;
      text-shadow: 2px 2px 0px var(--deep-black);
    }

    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
      width: 100%;
    }

    .portal-card {
      background: var(--clean-white);
      border: 6px solid var(--deep-black);
      padding: 40px 30px;
      text-decoration: none;
      color: var(--deep-black);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 12px 12px 0px var(--brand-red);
    }

    .portal-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 16px 16px 0px var(--brand-red);
    }

    .portal-card:active {
      transform: translate(6px, 6px);
      box-shadow: 6px 6px 0px var(--brand-red);
    }

    .card-icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 2.2rem;
      font-weight: 900;
      font-style: italic;
      margin-bottom: 10px;
      border-bottom: 4px solid var(--brand-red);
      padding-bottom: 5px;
    }

    .card-desc {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
    }

    .sticker {
      position: absolute;
      top: -20px;
      right: -20px;
      background: var(--impact-yellow);
      color: var(--deep-black);
      font-weight: 900;
      font-size: 1.2rem;
      padding: 8px 20px;
      border: 4px solid var(--deep-black);
      border-radius: 50px;
      transform: rotate(10deg);
      box-shadow: 4px 4px 0px var(--brand-red);
      z-index: 10;
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 5rem;
      }

      .hero-subtitle {
        font-size: 1.8rem;
      }

      .portal-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="speedlines"></div>

  <div class="container">
    <div class="kicker">MangaTech 2026 応募企画</div>
    <h1 class="hero-title">ジャンがり</h1>
    <h2 class="hero-subtitle">ジャンプ ＋ つながり</h2>

    <div class="portal-grid">

      <!-- プロトタイプ -->
      <a href="prototype.html" class="portal-card" style="transform: rotate(-2deg);">
        <div class="sticker">遊べる！</div>
        <div class="card-icon">📱</div>
        <h3 class="card-title">Prototype</h3>
        <p class="card-desc">スマホアプリのUI/UXを<br>実際に操作して体験する</p>
      </a>

      <!-- スライド -->
      <a href="slides.html" class="portal-card" style="transform: rotate(1deg);">
        <div class="sticker" style="background:var(--brand-red); color:var(--clean-white);">魅せる！</div>
        <div class="card-icon">📺</div>
        <h3 class="card-title">Pitch Deck</h3>
        <p class="card-desc">全22枚のシネマティックな<br>プレゼンテーションスライド</p>
      </a>

      <!-- 企画書 -->
      <a href="proposal.html" class="portal-card" style="transform: rotate(-1deg);">
        <div class="sticker" style="background:var(--deep-black); color:var(--clean-white);">読める！</div>
        <div class="card-icon">📄</div>
        <h3 class="card-title">Proposal</h3>
        <p class="card-desc">A4印刷対応・全20ページの<br>詳細な企画提案書</p>
      </a>

      <!-- フロントエンド (Next.js) -->
      <a href="./frontend/out/index.html" class="portal-card"
        style="transform: rotate(2deg); border-color: var(--impact-yellow);">
        <div class="sticker" style="background:var(--clean-white); color:var(--deep-black);">開発中！</div>
        <div class="card-icon">⚛️</div>
        <h3 class="card-title">Next.js WebApp</h3>
        <p class="card-desc">React実装のMVP本番環境<br><span style="font-size: 0.8rem; color: #666;">※ローカルサーバー(3001)用</span>
        </p>
      </a>

    </div>
  </div>

</body>

</html>
